name: Build Portable WinUI3 Browser

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish Self-Contained Release Artifacts
      run: |
        dotnet publish MyPortableBrowser.csproj -c Release -r win-x64 --self-contained true -p:PublishReadyToRun=true -o ./publish

    - name: Package Portable Zip Archive
      uses: actions/upload-artifact@v4
      with:
        name: Portable-ChromeLite-Browser
        path: ./publish/
