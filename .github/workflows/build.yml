name: Build and Publish Trading Browser

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore TradingBrowser.csproj

    - name: Compile and Publish Framework-Dependent Binary
      run: |
        dotnet publish TradingBrowser.csproj `
          -c Release `
          -r win-x64 `
          -p:InvariantGlobalization=true `
          -p:DisableEmbeddedSignature=true `
          -p:PublishReadyToRun=false `
          -o ./PublishOutput

    - name: Compress Build Artifacts
      shell: pwsh
      run: |
        Compress-Archive -Path ./PublishOutput/* -DestinationPath ./TradingBrowser-win-x64.zip

    - name: Upload Finished Browser Release
      uses: actions/upload-artifact@v4
      with:
        name: TradingBrowser-Executable
        path: ./TradingBrowser-win-x64.zip
        if-no-files-found: error
