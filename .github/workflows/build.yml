name: Cloud Native Portable Build Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Clone Code Repository
      uses: actions/checkout@v4

    - name: Setup .NET 10 Cutting Edge Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Restore NuGet Project Dependencies
      run: dotnet restore TradingBrowser.csproj

    - name: Compile Ultra-Lightweight Binary (Self Contained Mode)
      run: >
        dotnet publish TradingBrowser.csproj
        -c Release
        -r win-x64
        --self-contained true
        -p:PublishTrimmed=true
        -p:TrimMode=partial
        -p:InvariantGlobalization=true
        -p:DisableEmbeddedSignature=true
        -o ./PublishOutput

    - name: Purge Residual WinAppSDK Localizations
      run: |
        Get-ChildItem -Path ./PublishOutput -Recurse -Directory | 
        Where-Object { $_.Name -ne "en-US" -and $_.Name -match "^[a-z]{2}(-[A-Z]{2})?$" } | 
        Remove-Item -Recurse -Force

    - name: Compress into Standalone Portable ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PortableTradingBrowser-Win11-x64
        path: ./PublishOutput/
