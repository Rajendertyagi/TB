name: Build and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore Dependencies
      run: dotnet restore TradingBrowser.csproj

    - name: Build and Compile
      # Explicitly targeting TradingBrowser.csproj resolves MSB1011
      run: dotnet build TradingBrowser.csproj --configuration Release --no-incremental

    - name: Publish Standalone
      # Creates the portable x64 output you requested
      run: dotnet publish TradingBrowser.csproj --configuration Release -r win-x64 --self-contained false --no-build
