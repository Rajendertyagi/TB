name: Build and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore Dependencies
      run: dotnet restore

    # This is the critical step that clears the cache for the XAML Compiler
    - name: Build and Compile
      run: dotnet build TradingBrowser.csproj --configuration Release --no-incremental

    - name: Run Tests
      run: dotnet test --no-build --configuration Release
