name: Build Minimal Browser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  create:
    tags:
      - v*

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish Single File
      run: dotnet publish --configuration Release --runtime win-x64 --self-contained false --output publish
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MinimalBrowser-Portable
        path: publish/MinimalBrowser.exe
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: publish/MinimalBrowser.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
