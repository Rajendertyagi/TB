name: TB Build

on:
  push:
    branches:
      - main
      - milestone-*
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TB.slnx

      - name: Build
        run: dotnet build TB.slnx --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/TB/TB.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TB-win-x64
          path: publish
