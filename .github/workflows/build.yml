name: Build and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # CRITICAL: This step generates the package reference map
    - name: Restore Dependencies
      run: dotnet restore TradingBrowser.csproj --force

    # CRITICAL: This step builds only the project with a clean state
    - name: Build and Compile
      run: dotnet build TradingBrowser.csproj --configuration Release --no-incremental

    - name: Publish Standalone
      run: dotnet publish TradingBrowser.csproj --configuration Release -r win-x64 --self-contained false --no-build
