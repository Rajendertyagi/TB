name: RTBrowser CI

on:

  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

jobs:

  build:

    runs-on: windows-latest

    permissions:
      contents: read

    steps:

      # =========================================
      # CHECKOUT
      # =========================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================================
      # SETUP .NET 10
      # =========================================

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # =========================================
      # CACHE NUGET
      # =========================================

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: >
            ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # =========================================
      # RESTORE
      # =========================================

      - name: Restore Dependencies
        run: >
          dotnet restore
          RTBrowser.sln
          --runtime win-x64

      # =========================================
      # BUILD
      # =========================================

      - name: Build RTBrowser
        run: >
          dotnet build
          RTBrowser.sln
          --configuration Release
          --runtime win-x64
          --self-contained false
          --no-restore

      # =========================================
      # PUBLISH PORTABLE X64
      # =========================================

      - name: Publish Portable Build
        run: >
          dotnet publish
          src/RTBrowser.App/RTBrowser.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:DebugType=None
          -p:DebugSymbols=false
          --output publish/win-x64

      # =========================================
      # UPLOAD ARTIFACT
      # =========================================

      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RTBrowser-win-x64-portable
          path: publish/win-x64/
