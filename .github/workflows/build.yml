name: Build Minimal Browser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  create:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build in Short Path (Avoid XamlCompiler long path issues)
      run: |
        $buildDir = "C:\build"
        New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
        
        # Copy all project files explicitly
        Get-ChildItem -Path . -Exclude .git, .github | Copy-Item -Destination $buildDir -Recurse -Force
        
        # Verify project file exists
        if (!(Test-Path "$buildDir\MinimalBrowser.csproj")) {
          Write-Error "Project file not found in build directory!"
          Get-ChildItem $buildDir
          exit 1
        }
        
        Push-Location $buildDir
        try {
          dotnet build --configuration Release --no-restore
        } finally {
          Pop-Location
        }

    - name: Publish Output
      run: |
        $source = "C:\build\bin\Release\net10.0-windows10.0.22621.0\win-x64"
        $dest = "PublishOutput"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        if (Test-Path $source) {
          Copy-Item -Recurse -Force "$source\*" $dest
        } else {
          $fallback = "C:\build\bin\Release\net10.0-windows10.0.22621.0"
          if (Test-Path $fallback) { Copy-Item -Recurse -Force "$fallback\*" $dest }
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MinimalBrowser-Portable
        path: ./PublishOutput
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: ./PublishOutput/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
